name: CD Pipeline

on:
  push:
    branches: [develop]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_FILE: release.keystore

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      # Setup Java (before install so Gradle wrapper is available for caching)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install dependencies
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      # 🔐 Decode keystore
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/$KEYSTORE_FILE

      - name: Build AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease -Dorg.gradle.daemon=false

      - name: Verify AAB
        run: ls -la android/app/build/outputs/bundle/release/

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      # Verify APK (optional, for testing or fallback)   
      - name: Verify APK
        run: ls -la android/app/build/outputs/apk/release/

      # Build APK (optional, for testing or fallback)
      - name: Upload APK 
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # Setup Ruby (Fastlane)
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      # Install Fastlane
      - name: Install Fastlane
        run: gem install fastlane

      # Setup Google Play credentials
      - name: Create Google Play key
        run: printf '%s' "$PLAY_STORE_JSON" > android/fastlane/google-play-key.json
        env:
          PLAY_STORE_JSON: ${{ secrets.PLAY_STORE_JSON }}

      # Deploy to Play Store
      - name: Deploy to Play Store
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          fastlane deploy

      # Cleanup sensitive files
      - name: Cleanup secrets
        if: always()
        run: |
          rm -f android/app/$KEYSTORE_FILE
          rm -f android/fastlane/google-play-key.json
