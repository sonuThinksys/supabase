name: CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v5

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'yarn'

      # Install dependencies
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      # Install Fastlane and plugins via Bundler
      - name: Install Fastlane
        run: |
          cd android
          bundle install

      # Build APK using Fastlane
      - name: Build Release
        run: |
          cd android
          bundle exec fastlane build_release

      # Verify APK exists
      - name: Verify APK
        run: ls -la android/app/build/outputs/apk/release/

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: app-release-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
