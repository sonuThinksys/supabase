name: CI Pipeline

on:
  push:
    branches: [develop]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
      # 3. Install dependencies (faster & consistent)
      - name: Install dependencies
        run: yarn install

      # 5. Run tests (CI-safe mode)
      - name: Run tests
        run: yarn test